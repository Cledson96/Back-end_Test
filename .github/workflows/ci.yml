name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-pnpm
      - uses: biomejs/setup-biome@f382a98e582959e6aaac8e5f8b17b31749018780 # v2
        with:
          version: latest
      - name: Biome (server + shared)
        run: cd server && pnpm exec biome ci .
      - name: Install client dependencies
        run: cd client && pnpm install
      - name: ESLint (client)
        run: cd client && pnpm lint

  server-build:
    name: Server Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-pnpm
      - name: Build server
        run: cd server && pnpm build

  server-test:
    name: Server Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-pnpm
      - name: Test server
        run: cd server && pnpm test

  client-build:
    name: Client Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-pnpm
      - name: Install client dependencies
        run: cd client && pnpm install
      - name: Build client
        run: cd client && pnpm build
