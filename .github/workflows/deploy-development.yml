name: Deploy development

on:
  push:
    branches:
      - development

concurrency:
  group: development
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/cledson96/back-end-test
  IMAGE_TAG: development

jobs:
  deploy:
    name: Build, publish, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pnpm

      - name: Install client dependencies
        run: cd client && pnpm install --frozen-lockfile

      - name: Lint server
        run: cd server && pnpm lint

      - name: Test server
        run: cd server && pnpm test

      - name: Build server
        run: cd server && pnpm build

      - name: Lint client
        run: cd client && pnpm lint

      - name: Build client
        run: cd client && pnpm build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_IMAGE: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          APP_PORT: ${{ secrets.DEVELOPMENT_APP_PORT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_IMAGE,APP_PORT
          script: |
            set -euo pipefail
            cd "${{ secrets.DEVELOPMENT_VPS_APP_DIR }}"
            git fetch origin development
            git checkout development
            git pull --ff-only origin development
            if [ -z "${APP_PORT:-}" ]; then APP_PORT=8081; fi
            cat > .env.production <<ENV
            APP_IMAGE=${APP_IMAGE}
            APP_PORT=${APP_PORT}
            NODE_ENV=production
            HOST=0.0.0.0
            PORT=8080
            DATABASE_URL=file:/data/prod.db
            CORS_ORIGIN=https://sqrt-dev.cledson.com.br
            COMMON_RATE_LIMIT_WINDOW_MS=1000
            COMMON_RATE_LIMIT_MAX_REQUESTS=100
            ENV
            docker compose --env-file .env.production pull
            docker compose --env-file .env.production run --rm app node scripts/apply-sqlite-migrations.mjs
            docker compose --env-file .env.production up -d --remove-orphans
            docker image prune -f
